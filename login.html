<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — VoteCast</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗳️</text></svg>" />
  <style>
    /* ── Full-page background: vote_1.jpg ── */
    body {
      min-height: 100vh;
      background: url('vote_1.jpg') center center / cover no-repeat fixed;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Subtle dark veil over the photo so text is legible */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(6, 10, 22, 0.55);
      z-index: 0;
    }

    /* Centered transparent card */
    .glass-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      background: rgba(13, 20, 40, 0.55);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.45);
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Override login-logo background to transparent */
    .login-logo p { color: rgba(255,255,255,0.6); }

    /* Inputs slightly more transparent inside glass card */
    .form-group input {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 255, 255, 0.12);
      color: #fff;
    }
    .form-group input::placeholder { color: rgba(255,255,255,0.35); }
    .form-group input:focus {
      background: rgba(99, 179, 237, 0.10);
      border-color: var(--blue);
    }
    .form-group label { color: rgba(255,255,255,0.7); }
    .input-icon { color: rgba(255,255,255,0.4); }
    .divider { color: rgba(255,255,255,0.3); }
    .divider::before, .divider::after { background: rgba(255,255,255,0.12); }
    .form-hint { color: rgba(255,255,255,0.4); }

    @media (max-width: 480px) {
      .glass-card { padding: 36px 24px; }
    }
  </style>
</head>
<body>

  <!-- Centered transparent login card over vote_1.jpg -->
  <div class="glass-card">

    <div class="login-logo">
      <div class="logo-icon">🗳️</div>
      <h2>Vote<span style="color:var(--gold)">Cast</span></h2>
      <p>Sign in with your username and passcode</p>
    </div>

    <form id="login-form" novalidate>

      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" id="username" placeholder="Your username"
                 autocomplete="username" autocapitalize="none" spellcheck="false" />
        </div>
        <p class="field-error" id="username-error"></p>
      </div>

      <div class="form-group">
        <label for="passcode">Passcode</label>
        <div class="input-wrap">
          <span class="input-icon">🔑</span>
          <input type="password" id="passcode" placeholder="e.g. XKP-2MQA"
                 autocomplete="current-password" autocapitalize="characters" />
          <button type="button" class="input-toggle" id="toggle-password" aria-label="Toggle">👁</button>
        </div>
        <p class="field-error" id="passcode-error"></p>
      </div>

      <button type="submit" class="btn btn-primary btn-lg btn-full" id="login-btn">
        Sign In →
      </button>
    </form>

    <div class="divider">Options</div>
    <p class="form-hint">
      New voter?
      <button class="link-btn" onclick="window.location.href='register.html'">Register here</button>
      &nbsp;·&nbsp;
      <button class="link-btn" onclick="window.location.href='admin-login.html'">Admin login</button>
    </p>

  </div>

  <div id="toast-container"></div>
  <script src="script.js"></script>
</body>
</html>
